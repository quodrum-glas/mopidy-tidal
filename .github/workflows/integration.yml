name: Integration Test

on:
  schedule:
    - cron: "0 0 * * 0" # weekly
  push:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        versions:
          - { python: "3.10", mopidy: "3.3" }
          - { python: "3.11", mopidy: "3.3" }
          - { python: "3.12", mopidy: "3.3" }
          - { python: "3.13", mopidy: "3.3" }
          - { python: "3.10", mopidy: "3.4" }
          - { python: "3.11", mopidy: "3.4" }
          - { python: "3.12", mopidy: "3.4" }
          - { python: "3.13", mopidy: "3.4" }
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.versions.python }}
          enable-cache: true
          cache-suffix: ${{ matrix.versions.python }}-${{ matrix.versions.mopidy }}

      - name: Install Mopidy system-wide
        run: |
          sudo apt update
          sudo apt install mopidy libgirepository1.0-dev mpc \
            build-essential python3-dev python3-pip \
            gir1.2-gst-plugins-base-1.0 \
            gir1.2-gstreamer-1.0 \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-tools \
            libcairo2-dev \
            libgirepository-2.0-dev \
            python3-gst-1.0

      - name: Correct mopidy version
        run: |
          uv add mopidy==${{ matrix.versions.mopidy }}
          uv pip show mopidy

      - name: Install mopidy-tidal
        run: uv sync --group complete

      - name: Integration test
        run: make integration-test
