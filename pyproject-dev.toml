[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "Mopidy-Tidal"
version = "0.4.0"
description = "Tidal music service integration"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">= 3.10"
authors = [{ name = "Johannes Linde", email = "josaksel.dk@gmail.com" }]
classifiers = [
    "Environment :: No Input/Output (Daemon)",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Sound/Audio :: Players",
]
# NO dependencies - installed via system packages
dependencies = []

[project.optional-dependencies]
dev = ["pytest", "pytest-cov", "pytest-mock", "ruff"]

[dependency-groups]
complete = ["mopidy-tidal[dev]"]

[project.entry-points."mopidy.ext"]
tidal = "mopidy_tidal:Extension"

[project.urls]
Homepage = "https://github.com/quodrum-glas/mopidy-tidal"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.sdist]
include = ["mopidy_tidal/", "LICENSE", "README.md"]

[tool.hatch.build.targets.wheel]
packages = ["mopidy_tidal"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["mopidy_tidal"]
force-single-line = false

[tool.pytest.ini_options]
testpaths = ["tests"]
